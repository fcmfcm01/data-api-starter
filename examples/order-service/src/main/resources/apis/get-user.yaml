api:
  id: get-user
  name: Get User from External API
  path: /v1/external/users/{id}
  method: GET
  parameters:
    - name: id
      in: path
      type: integer
      required: true
      description: User ID
  source:
    type: http
    url: https://jsonplaceholder.typicode.com/users/1
    timeout: 5000
  response:
    type: single
    fields:
      - name: id
        scope: basic
      - name: name
        scope: basic
      - name: username
        scope: basic
      - name: email
        scope: detail
      - name: phone
        scope: detail
      - name: website
        scope: detail
      - name: address
        scope: sensitive
        pii: true
      - name: company
        scope: sensitive
  scopes:
    user.basic: basic
    user.detail: detail
    user.admin: sensitive
  sla:
    timeout: 5000
