spring:
  datasource:
    url: jdbc:h2:mem:orders;MODE=MSSQLServer
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

data-api:
  scope-mapping: "internal:basic+detail+financial,user.basic:basic,user.detail:basic+detail,user.admin:basic+detail+sensitive"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
