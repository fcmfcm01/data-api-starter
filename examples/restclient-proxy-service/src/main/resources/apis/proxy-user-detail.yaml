api:
  id: proxy-user-detail
  name: Proxy User Detail
  path: /v1/users/{id}
  method: GET
  parameters:
    - name: id
      in: path
      type: integer
      required: true
  source:
    type: http
    url: "https://jsonplaceholder.typicode.com/users/{id}"
    timeout: 5000
  response:
    type: single
    fields:
      - name: id
        scope: basic
      - name: name
        scope: basic
      - name: email
        scope: detail
      - name: phone
        scope: sensitive
  scopes:
    user.read: basic
  sla:
    timeout: 5000
