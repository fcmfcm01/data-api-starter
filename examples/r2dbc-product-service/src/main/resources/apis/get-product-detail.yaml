api:
  id: get-product-detail
  name: Get Product Detail
  path: /v1/products/{id}
  method: GET
  parameters:
    - name: id
      in: path
      type: integer
      required: true
      description: Product ID
  source:
    type: r2dbc
    datasource: connectionFactory
    query: "SELECT id, name, price, category FROM products WHERE id = :id"
  response:
    type: single
    fields:
      - name: id
        scope: basic
      - name: name
        scope: basic
      - name: price
        scope: basic
      - name: category
        scope: detail
  scopes:
    product.read: basic
  sla:
    timeout: 3000
